<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBUSS PR Tracker – Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <h1>REBUSS PR Tracker Settings</h1>
    <p class="subtitle">Configure your Azure DevOps connection below.</p>

    <form id="settings-form" autocomplete="off">
      <!-- Organization -->
      <label for="organization">Organization <span class="required">*</span></label>
      <input
        type="text"
        id="organization"
        name="organization"
        placeholder="e.g. myorg (not the full URL)"
        required
      />
      <small>The slug after <code>dev.azure.com/</code></small>

      <!-- Project -->
      <label for="project">Project <span class="required">*</span></label>
      <input
        type="text"
        id="project"
        name="project"
        placeholder="e.g. MyProject"
        required
      />

      <!-- Team (optional) -->
      <label for="team">Team <span class="optional">(optional)</span></label>
      <input
        type="text"
        id="team"
        name="team"
        placeholder="e.g. MyTeam (name or ID)"
      />
      <small>If omitted, PRs from the entire project are shown.</small>

      <!-- PAT -->
      <label for="pat">Personal Access Token <span class="required">*</span></label>
      <div class="pat-row">
        <input
          type="password"
          id="pat"
          name="pat"
          placeholder="Paste your Azure DevOps PAT"
          required
        />
        <button type="button" id="btn-toggle-pat" title="Show / hide PAT">&#x1f441;</button>
      </div>
      <small>
        Create a PAT at
        <a href="https://dev.azure.com" target="_blank" rel="noopener">dev.azure.com</a>
        &rarr; User settings &rarr; Personal access tokens.
        Required scopes: <strong>Code (Read)</strong>.
      </small>

      <!-- Auto-refresh -->
      <fieldset>
        <legend>Auto-refresh</legend>
        <label class="checkbox-label">
          <input type="checkbox" id="autoRefresh" name="autoRefresh" checked />
          Enable auto-refresh
        </label>
        <label for="refreshInterval">Interval (minutes)</label>
        <input
          type="number"
          id="refreshInterval"
          name="refreshInterval"
          value="5"
          min="1"
          max="60"
        />
      </fieldset>

      <!-- Actions -->
      <div class="actions">
        <button type="submit" id="btn-save">Save Settings</button>
        <button type="button" id="btn-test">Test Connection</button>
      </div>

      <div id="message" class="hidden"></div>
    </form>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
